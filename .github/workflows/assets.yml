name: Asset Optimization

on:
  push:
    branches:
      - main
    paths:
      - 'kavya-3d/public/assets/source/**'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: kavya-3d

jobs:
  optimize-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: kavya-3d/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install glTF Transform CLI globally
        run: npm install -g @gltf-transform/cli

      - name: Optimize assets
        run: npm run assets:optimize

      - name: Commit and push generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets/*.glb public/assets/manifest.json
          if git diff --cached --quiet; then
            echo "No generated asset changes to commit."
          else
            git commit -m "chore: regenerate optimized GLB assets [skip ci]"
            git push
          fi

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-manifest
          path: kavya-3d/public/assets/manifest.json
